version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      APP_BASE_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: file:./prisma/dev.db
      LOG_LEVEL: info
    volumes:
      - backend_data:/app/prisma
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend_data:
  backend_logs:
